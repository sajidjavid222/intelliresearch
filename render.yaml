# IntelliResearch — Render Blueprint
# Deploys: Postgres database + FastAPI backend + Next.js frontend.
# In Render: New + → "Blueprint" → connect this repo. Render reads this file.
#
# After the first deploy you must set a few secret/URL env vars (marked
# `sync: false`) in each service's dashboard — see DEPLOY.md.

databases:
  - name: intelliresearch-db
    databaseName: intelliresearch
    user: intelliresearch
    plan: free

services:
  # ---------------- Backend (FastAPI) ----------------
  - type: web
    name: intelliresearch-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intelliresearch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true            # Render generates a strong secret
      - key: ENVIRONMENT
        value: production              # engages production-readiness checks
      - key: DEBUG
        value: "false"
      - key: SENTRY_DSN
        sync: false                    # optional: paste your Sentry DSN to enable
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_API_KEY
        sync: false                    # paste your key in the dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false                    # optional, for Google sign-in
      - key: FRONTEND_ORIGIN
        sync: false                    # set to the frontend URL after deploy

  # ---------------- Frontend (Next.js) ----------------
  - type: web
    name: intelliresearch-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        sync: false                    # set to the backend URL after deploy
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false                    # optional: frontend Sentry DSN (baked at build)
