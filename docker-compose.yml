# ResearchPilot full stack. Postgres, Redis, and Qdrant are included for
# production parity; the backend defaults to SQLite if DATABASE_URL is unset,
# so you can comment out postgres to run lighter.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: researchpilot
      POSTGRES_PASSWORD: researchpilot
      POSTGRES_DB: researchpilot
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant:/qdrant/storage"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://researchpilot:researchpilot@postgres:5432/researchpilot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      FRONTEND_ORIGIN: http://localhost:3000
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports: ["8000:8000"]
    depends_on: [postgres, redis, qdrant]

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports: ["3000:3000"]
    depends_on: [backend]

volumes:
  pgdata:
  qdrant:
