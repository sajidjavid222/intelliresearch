# Keeps the Render free-tier backend awake during active hours so visitors
# don't hit the ~30s cold start.
#
# Why a self-looping job: GitHub's scheduler is heavily throttled and does NOT
# honour fine-grained cron — a "*/10" schedule actually fires only every 1-3
# hours in practice, which is far too sparse to beat the 15-min hibernation.
# So instead each run *loops internally*, pinging every ~10 min for ~55 min,
# and we start runs twice an hour with a concurrency queue so a fresh run picks
# up the moment the previous one ends → continuous coverage through the window.
#
# Why only the backend: it's the slow one to boot (~20-30s). Pinging it during
# the active window (02:00-18:59 UTC ≈ 7:30am-12:30am IST) keeps it warm ~16h/day,
# leaving headroom under Render's free instance-hours so the frontend isn't
# starved. (Pinging both 24/7 risks exceeding the free quota.)
#
# Note: GitHub disables scheduled workflows if the repo has no activity for
# 60 days — a commit or a click on "Enable" in the Actions tab revives it.

name: Keep backend awake

on:
  schedule:
    - cron: "1,31 2-18 * * *" # twice an hour; each run self-loops to fill the gaps
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: keepalive
  cancel-in-progress: false # queue overlapping runs instead of cancelling → seamless hand-off

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Ping backend health every ~10 min for ~55 min
        run: |
          url="https://intelliresearch-backend.onrender.com/api/health"
          deadline=$(( $(date +%s) + 55*60 ))
          while :; do
            # A single ping may need to wake a hibernating instance, so retry.
            for i in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$url" || echo 000)
              echo "$(date -u +%H:%M:%SZ) attempt $i -> HTTP $code"
              [ "$code" = "200" ] && break
              sleep 15
            done
            [ "$(date +%s)" -ge "$deadline" ] && break
            sleep 600 # 10 min between pings
          done
          echo "keep-alive window complete"
